params {
    //Directory to output results. Should end with a "/"
    results_output = null
    
    //Input samples. 
    //used to look for data and resources. 
    nf_basedir = null
    input_samples_path = null
    
    
    //Global pipeline run options
    //run_mode options: with_quant, pre_quant (validated by an assert in isoseq2.nf;
    //must be supplied via the params-file, else the run fails fast)
    run_mode = null
    //new_test_value
    number_of_chunks=10

    subset_regions_bed = null
    dedup_batch_size = 5000000
    exclude_samples = null

    //Skera primers used by Skera to deconcatenate Kinnex reads
    skera_primers = null
    //10X primers
    tenx_primers = null
    //isoseq tag UMI/barcode design. 3' kit (default): T-12U-16B.
    //10x 5' kit (e.g. GEM-X 5' v3): 16B-12U-13X-T (BC-UMI-TSO on the 5' side).
    tenx_design = "T-12U-16B"
    //Minimum polyA length to refine reads
    min_polya_length = 20
    //10X cell barcode whitelist
    threeprime_whitelist = null
    //Genome FASTA files
    genome_fasta_f = null
    //Barcode correction strategy (used by isoseq correct; percentile or knee)
    barcode_correction_method = "percentile"
    barcode_correction_percentile = "98"
    dedup_real_cells_only = "TRUE"
    min_umi_barcodes=1000
    //Run gtcheck or not and the file with ref GT VCFs
    run_gtcheck = "FALSE"
    tsv_donor_panel_vcfs = null
    ZSCORE_THRESH= 8
    ZSCORE_DIST_THRESH= 8
    run_barcode_check = "FALSE"
    ref_barcode_list= null
    min_common_barcodes_percent=40
    min_n_common_barcodes=200
    
    ///// SQANTI3 files //////
    //SQANTI3 software path
    sqanti3_path = null
    //CAGE peaks 
    cage_peak_f = null
    //PolyA sites in the human genome (used by SQANTI3)
    polya_sites = null
    //PolyA motifs
    polya_f = null
    //SQANTI3 rules filter JSON
    sqanti_filter_json = null


    ///// IsoQuant files //////
    chunks = 16
    isoquant_exclusion_regions_bed = null
    //GTF file (used by isoquant)
    gtf_f = null
    custom_config_version      = 'master'
    custom_config_base         = "https://raw.githubusercontent.com/nf-core/configs/${params.custom_config_version}"

    /// Pfam annotation files /////
    pfam_db = null
}
